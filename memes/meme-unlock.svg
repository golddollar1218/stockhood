<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A140C"/>
      <stop offset="100%" stop-color="#1B3D28"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
      <rect width="800" height="800" fill="url(#bg)"/>
      <rect x="100" y="160" width="600" height="480" rx="32" fill="#0A140C" stroke="#C8FF00" stroke-width="4"/>
      <image href="data:image/jpeg;base64," x="290" y="200" width="220" height="220"/>
      <text x="400" y="480" text-anchor="middle" fill="#C8FF00" font-family="Arial Black, Impact, sans-serif" font-size="44">UNLOCKING</text>
      <text x="400" y="540" text-anchor="middle" fill="#F4FFE8" font-family="Arial Black, Impact, sans-serif" font-size="36">TOKENIZED EQUITIES</text>
      <text x="400" y="600" text-anchor="middle" fill="#C8FF00" font-family="Arial, sans-serif" font-size="22" letter-spacing="3">ON ROBINHOOD</text>
    
</svg>